<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Best Creator In Obby Creator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Trebuchet MS', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      overflow: hidden;
      transition: background 0.3s;
    }

    h1 {
      font-size: 48px;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    #chanceDisplay, #rankDisplay, #rollCountDisplay, #multiplierDisplay {
      font-size: 22px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    #cooldownDisplay {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.8;
      height: 22px;
    }

    #rollBtn, #prestigeBtn {
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      color: white;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      transition: 0.2s;
      margin-top: 10px;
    }

    #rollBtn:disabled {
      background: gray;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #rollBtn:hover:not(:disabled),
    #prestigeBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255,255,255,0.7);
    }

    #prestigeBtn {
      display: none;
      background: linear-gradient(90deg, #00ff9d, #00c2ff);
    }

    #result {
      margin-top: 40px;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #popupImg {
      margin-top: 25px;
      width: 260px;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.4s ease, transform 0.4s ease;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.7));
    }

    /* Burst particles */
    .burst {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: burstAnim 0.8s ease-out forwards;
    }

    @keyframes burstAnim {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
    }

    /* FAIL EFFECTS */
    @keyframes screenShake {
      0% { transform: translate(0,0); }
      25% { transform: translate(10px,-10px); }
      50% { transform: translate(-10px,10px); }
      75% { transform: translate(10px,10px); }
      100% { transform: translate(0,0); }
    }

    .shake {
      animation: screenShake 0.4s;
    }

    .failFlash {
      background: linear-gradient(135deg, #ff0000, #8b0000) !important;
    }

    #failText {
      position: absolute;
      top: 20%;
      font-size: 60px;
      font-weight: bold;
      color: #ff4d4d;
      opacity: 0;
      text-shadow: 0 0 20px red;
      transition: opacity 0.3s;
    }
  </style>
</head>

<body>

  <h1>Best Creator In Obby Creator</h1>

  <div id="rankDisplay">Rank: Beginner</div>
  <div id="rollCountDisplay">Rolls: 0</div>
  <div id="chanceDisplay">Chance to NOT get abcdefg: <b>0.00%</b></div>
  <div id="multiplierDisplay">Multiplier: 1x</div>

  <button id="rollBtn">ROLL</button>
  <button id="prestigeBtn">PRESTIGE</button>

  <div id="cooldownDisplay"></div>

  <div id="result">abcdefg the GOAT</div>

  <img id="popupImg" src="https://i.imgur.com/dmmXw48.png" />

  <div id="failText">FAILED ROLL!</div>

  <script>
    const result = document.getElementById("result");
    const rollBtn = document.getElementById("rollBtn");
    const prestigeBtn = document.getElementById("prestigeBtn");
    const popupImg = document.getElementById("popupImg");
    const chanceDisplay = document.getElementById("chanceDisplay");
    const cooldownDisplay = document.getElementById("cooldownDisplay");
    const rankDisplay = document.getElementById("rankDisplay");
    const rollCountDisplay = document.getElementById("rollCountDisplay");
    const multiplierDisplay = document.getElementById("multiplierDisplay");
    const failText = document.getElementById("failText");

    let failChance = parseFloat(localStorage.getItem("failChance")) || 0;
    let rolls = parseInt(localStorage.getItem("rolls")) || 0;
    let rank = localStorage.getItem("rank") || "Beginner";
    let multiplier = parseFloat(localStorage.getItem("multiplier")) || 1;

    const cooldownTime = 3;
    let cooldown = false;

    const rankData = [
      { name: "Beginner", rolls: 0, gain: 0.01 },
      { name: "Bronze", rolls: 50, gain: 0.02 },
      { name: "Silver", rolls: 150, gain: 0.03 },
      { name: "Gold", rolls: 300, gain: 0.05 },
      { name: "Diamond", rolls: 600, gain: 0.10 },
      { name: "Mythic", rolls: 1000, gain: 0.20 }
    ];

    function updateRank() {
      for (let i = rankData.length - 1; i >= 0; i--) {
        if (rolls >= rankData[i].rolls) {
          rank = rankData[i].name;
          break;
        }
      }
      rankDisplay.textContent = "Rank: " + rank;
      localStorage.setItem("rank", rank);
    }

    function getChanceGain() {
      return rankData.find(r => r.name === rank).gain * multiplier;
    }

    function saveData() {
      localStorage.setItem("failChance", failChance);
      localStorage.setItem("rolls", rolls);
      localStorage.setItem("rank", rank);
      localStorage.setItem("multiplier", multiplier);
    }

    function updateUI() {
      chanceDisplay.innerHTML = `Chance to NOT get abcdefg: <b>${failChance.toFixed(2)}%</b>`;
      rollCountDisplay.textContent = "Rolls: " + rolls;
      rankDisplay.textContent = "Rank: " + rank;
      multiplierDisplay.textContent = "Multiplier: " + multiplier.toFixed(1) + "x";

      prestigeBtn.style.display = failChance >= 100 ? "block" : "none";
    }

    updateRank();
    updateUI();

    const names = [
      "foxyras",
      "transported13",
      "XYZcreeper",
      "bibbo123011",
      "d1sweat",
      "jero",
      "doom_e10"
    ];

    rollBtn.addEventListener("click", () => {
      if (cooldown) return;

      startCooldown();

      popupImg.style.opacity = 0;
      popupImg.style.transform = "scale(0.6)";

      rolls++;
      updateRank();

      failChance += getChanceGain();
      if (failChance > 100) failChance = 100;

      saveData();
      updateUI();

      rollAnimation();
      particleBurst();
    });

    function startCooldown() {
      cooldown = true;
      rollBtn.disabled = true;

      let timeLeft = cooldownTime;
      cooldownDisplay.textContent = `Cooldown: ${timeLeft}s`;

      const timer = setInterval(() => {
        timeLeft--;
        cooldownDisplay.textContent = `Cooldown: ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          cooldown = false;
          rollBtn.disabled = false;
          cooldownDisplay.textContent = "";
        }
      }, 1000);
    }

    function rollAnimation() {
      let index = 0;
      result.style.opacity = 1;

      const interval = setInterval(() => {
        result.textContent = names[index];
        index = (index + 1) % names.length;
      }, 120);

      setTimeout(() => {
        clearInterval(interval);

        triggerFailEffects();

        setTimeout(() => {
          result.textContent = "abcdefg";
          popupImg.style.opacity = 1;
          popupImg.style.transform = "scale(1)";
        }, 500);

      }, 1500);
    }

    function triggerFailEffects() {
      document.body.classList.add("failFlash");
      document.body.classList.add("shake");

      failText.style.opacity = 1;

      setTimeout(() => {
        document.body.classList.remove("failFlash");
        document.body.classList.remove("shake");
        failText.style.opacity = 0;
      }, 500);
    }

    function particleBurst() {
      for (let i = 0; i < 30; i++) {
        const p = document.createElement("div");
        p.classList.add("burst");

        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 40;

        p.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        p.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);

        p.style.left = (window.innerWidth / 2) + "px";
        p.style.top = (window.innerHeight / 2) + "px";

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 800);
      }
    }

    prestigeBtn.addEventListener("click", () => {
      multiplier *= 2;
      failChance = 0;
      rolls = 0;
      rank = "Beginner";

      saveData();
      updateUI();
    });
  </script>

</body>
</html>
