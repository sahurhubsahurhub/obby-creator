<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Best Creator In Obby Creator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Trebuchet MS', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 48px;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    #chanceDisplay {
      font-size: 22px;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    #cooldownDisplay {
      font-size: 18px;
      margin-top: 10px;
      opacity: 0.8;
      height: 22px;
    }

    #rollBtn {
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff8a00, #e52e71);
      color: white;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      transition: 0.2s;
    }

    #rollBtn:disabled {
      background: gray;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #rollBtn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255,255,255,0.7);
    }

    #result {
      margin-top: 40px;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #popupImg {
      margin-top: 25px;
      width: 260px;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.4s ease, transform 0.4s ease;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.7));
    }

    .burst {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: burstAnim 0.8s ease-out forwards;
    }

    @keyframes burstAnim {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>Best Creator In Obby Creator</h1>

  <div id="chanceDisplay">Chance to NOT get abcdefg: <b>0.00%</b></div>

  <button id="rollBtn">ROLL</button>

  <div id="cooldownDisplay"></div>

  <div id="result">abcdefg</div>

  <img id="popupImg" src="https://i.imgur.com/dmmXw48.png" />

  <script>
    const result = document.getElementById("result");
    const rollBtn = document.getElementById("rollBtn");
    const popupImg = document.getElementById("popupImg");
    const chanceDisplay = document.getElementById("chanceDisplay");
    const cooldownDisplay = document.getElementById("cooldownDisplay");

    let failChance = 0; 
    let cooldown = false;
    const cooldownTime = 3; // seconds

    const names = [
      "foxyras",
      "transported13",
      "XYZcreeper",
      "bibbo123011",
      "d1sweat",
      "jero",
      "doom_e10"
    ];

    rollBtn.addEventListener("click", () => {
      if (cooldown) return;

      startCooldown();
      popupImg.style.opacity = 0;
      popupImg.style.transform = "scale(0.6)";

      failChance += 0.01;
      if (failChance > 100) failChance = 100;

      chanceDisplay.innerHTML = `Chance to NOT get abcdefg: <b>${failChance.toFixed(2)}%</b>`;

      rollAnimation();
      particleBurst();
    });

    function startCooldown() {
      cooldown = true;
      rollBtn.disabled = true;

      let timeLeft = cooldownTime;
      cooldownDisplay.textContent = `Cooldown: ${timeLeft}s`;

      const timer = setInterval(() => {
        timeLeft--;
        cooldownDisplay.textContent = `Cooldown: ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          cooldown = false;
          rollBtn.disabled = false;
          cooldownDisplay.textContent = "";
        }
      }, 1000);
    }

    function rollAnimation() {
      let index = 0;
      result.style.opacity = 1;

      const interval = setInterval(() => {
        result.textContent = names[index];
        index = (index + 1) % names.length;
      }, 120);

      setTimeout(() => {
        clearInterval(interval);
        result.textContent = "abcdefg";

        popupImg.style.opacity = 1;
        popupImg.style.transform = "scale(1)";
      }, 1500);
    }

    function particleBurst() {
      for (let i = 0; i < 30; i++) {
        const p = document.createElement("div");
        p.classList.add("burst");

        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 40;

        p.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        p.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);

        p.style.left = (window.innerWidth / 2) + "px";
        p.style.top = (window.innerHeight / 2) + "px";

        document.body.appendChild(p);

        setTimeout(() => p.remove(), 800);
      }
    }
  </script>

</body>
</html>
